version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'type:chore'
      - 'area:deps'
    ignore:
      # eslint v10 requires plugin updates that aren't yet released
      # (eslint-plugin-react@7.37.5 peer caps at ^9.7). Re-enable once
      # the ecosystem catches up.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: 'development'
      production-dependencies:
        dependency-type: 'production'

  - package-ecosystem: github-actions
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'Asia/Shanghai'
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'type:ci'
      - 'area:deps'
