<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f5f7" id="meta-theme">
  <title>DG-Agent</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <h1>DG-Agent</h1>
        <span id="device-status" class="status-dot disconnected"></span>
        <span id="device-info"></span>
      </div>
      <div class="topbar-right">
        <select id="provider-quick" title="切换 AI 服务商">
          <option value="gemini">Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Claude</option>
        </select>
        <button id="btn-history" title="历史记录">📋</button>
        <button id="btn-connect" title="连接设备">🔗</button>
        <button id="btn-settings" title="设置">⚙️</button>
        <button id="btn-theme" title="切换主题">🌙</button>
      </div>
    </header>

    <div id="device-bar" class="hidden">
      <div class="channel" id="channel-a">
        <span>A通道</span>
        <span class="wave-indicator hidden" id="wave-a"></span>
        <div class="strength-bar"><div class="strength-fill" id="strength-a"></div></div>
        <span class="strength-value" id="strength-a-val">0</span>
      </div>
      <div class="channel" id="channel-b">
        <span>B通道</span>
        <span class="wave-indicator hidden" id="wave-b"></span>
        <div class="strength-bar"><div class="strength-fill" id="strength-b"></div></div>
        <span class="strength-value" id="strength-b-val">0</span>
      </div>
      <div class="battery" id="battery">🔋 --</div>
    </div>

    <div id="history-drawer" class="hidden">
      <div class="drawer-header">
        <h3>历史记录</h3>
        <button id="btn-new-conv" class="btn-sm">新对话</button>
      </div>
      <div id="history-list"></div>
    </div>

    <div id="chat-container">
      <div id="messages"></div>
    </div>

    <div id="input-area">
      <textarea id="user-input" placeholder="输入消息..." rows="1"></textarea>
      <button id="btn-send">发送</button>
    </div>

    <footer id="disclaimer">
      本项目仅供学习交流使用，请遵守当地法律法规。
      <a href="https://github.com/0xNullAI/DG-Agent" target="_blank">GitHub</a>
    </footer>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <button class="modal-close" id="btn-close-settings">✕</button>
        </div>
        <div class="modal-body">
          <h3>场景模式</h3>
          <div id="preset-select"></div>
          <div id="custom-prompt-area" class="hidden">
            <div class="setting-group">
              <label for="custom-system-prompt">自定义人设提示词</label>
              <textarea id="custom-system-prompt" rows="4" placeholder="描述你想要的 AI 人设和互动风格..."></textarea>
            </div>
            <div id="saved-prompts-area">
              <div class="saved-prompts-header">
                <label>已保存的自定义人设</label>
                <button id="btn-save-prompt" class="btn-sm">保存当前</button>
              </div>
              <div id="saved-prompts-list"></div>
            </div>
          </div>
          <hr class="modal-divider">
          <h3>AI 服务商</h3>
          <div id="provider-select"></div>
          <div id="provider-config"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
